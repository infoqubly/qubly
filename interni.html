    <!-- PHOTOSWIPE SCRIPT -->
    <script type="module">
        import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5.4.3/dist/photoswipe-lightbox.esm.js';
        
        // Auto-calculate image dimensions for PhotoSwipe
        document.querySelectorAll('.masonry-item').forEach(link => {
            const img = link.querySelector('img');
            const setDimensions = () => {
                link.setAttribute('data-pswp-width', img.naturalWidth || 1920);
                link.setAttribute('data-pswp-height', img.naturalHeight || 1080);
            };
            if(img.complete) {
                setDimensions();
            } else {
                img.onload = setDimensions;
            }
        });

        const lightbox = new PhotoSwipeLightbox({
            gallery: '#gallery',
            children: 'a.masonry-item',
            pswpModule: () => import('https://unpkg.com/photoswipe@5.4.3/dist/photoswipe.esm.js'),
            showHideAnimationType: 'zoom',
            showAnimationDuration: 700,
            hideAnimationDuration: 700
        });
        lightbox.init();
    </script>
